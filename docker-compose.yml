services:
  db:
    image: postgres:16-alpine
    container_name: makaze-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: makaze_db
      POSTGRES_USER: makaze
      POSTGRES_PASSWORD: makaze_password
    ports:
      - "5433:5432"
    volumes:
      - makaze_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  adminer:
    image: adminer:latest
    container_name: makaze-adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

  api:
    build:
      context: ./api
    container_name: makaze-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://makaze:makaze_password@db:5432/makaze_db
      JWT_SECRET: change-this-secret-before-production
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "true"
    ports:
      - "5001:5000"

volumes:
  makaze_postgres_data:
